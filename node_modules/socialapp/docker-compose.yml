version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: socialapp-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: socialapp

  backend:
    build: ./backend
    container_name: socialapp-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/socialapp
      - JWT_SECRET=dev_secret_change_in_production
      - JWT_EXPIRE=7d
      - CLIENT_URL=http://localhost:3000
      - NODE_ENV=development
      - PORT=5000
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      - mongodb

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: socialapp-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      - REACT_APP_API_URL=http://localhost:5000/api
    depends_on:
      - backend

volumes:
  mongo_data:
